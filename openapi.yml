openapi: 3.0.1
info:
  title: "Catalog Products"
  version: 0.0.1
  description: "Catalog Products"
  contact:
    email: email@domain.com
servers:
  - description: localhost
    url: http://localhost:8080/api
  - description: custom
    url: "{protocol}://{server}/{path}"
    variables:
      protocol:
        enum: ['http', 'https']
        default: 'http'
      server:
        default: 'localhost:8080'
      path:
        default: 'api'
tags:
  - name: "Default"
  - name: "CatalogProducts"


paths:
  /stock-reservations/{reservationId}:
    get:
      operationId: getStockReservation
      description: "getStockReservation"
      tags: [CatalogProducts]
      parameters:
        - name: "reservationId"
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockReservation"
  /stock-reservations:
    post:
      operationId: reserveStock
      description: "reserveStock"
      tags: [CatalogProducts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveStockInput"
      responses:
        "201":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockReservation"

components:
  schemas:
    ReserveStockInput:
      type: "object"
      x-business-entity: "ReserveStockInput"
      required:
      - "productId"
      - "quantity"
      - "customerId"
      properties:
        productId:
          type: "string"
        quantity:
          type: "integer"
          format: "int32"
        customerId:
          type: "string"
    StockReservation:
      type: "object"
      x-business-entity: "StockReservation"
      required:
      - "orderId"
      - "productId"
      - "quantity"
      - "customerId"
      - "status"
      properties:
        id:
          type: "integer"
          format: "int64"
          readOnly: true
        version:
          type: "integer"
          default: "null"
          description: "Version of the document (required in PUT for concurrency control,\
            \ should be null in POSTs)."
        orderId:
          type: "string"
        productId:
          type: "string"
        quantity:
          type: "integer"
          format: "int32"
        customerId:
          type: "string"
        status:
          $ref: "#/components/schemas/StockReservationStatus"
        reservedAt:
          type: "string"
          format: "date-time"
        releasedAt:
          type: "string"
          format: "date-time"
        cancellationReason:
          type: "string"
    StockReservationStatus:
      type: "string"
      x-business-entity: "StockReservationStatus"
      enum:
      - "PENDING"
      - "RESERVED"
      - "UNAVAILABLE"
      - "CANCELLED"

    Page:
      type: object
      required:
        - "content"
        - "totalElements"
        - "totalPages"
        - "size"
        - "number"
      properties:
        number:
          type: integer
          minimum: 0
        numberOfElements:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 0
          maximum: 200
          multipleOf: 25
        totalElements:
          type: integer
        totalPages:
          type: integer

  parameters:
    page:
      name: page
      in: query
      description: The number of results page
      schema:
        type: integer
        format: int32
        default: 0
    limit:
      name: limit
      in: query
      description: The number of results in a single page
      schema:
        type: integer
        format: int32
        default: 20
    sort:
      name: sort
      in: query
      description: Sort results by field name and direction (asc or desc)
      schema:
        type: array
        items:
          type: string

  securitySchemes:
    basicAuth:     # <-- arbitrary name for the security scheme
      type: http
      scheme: basic
    bearerAuth:     # <-- arbitrary name for the security scheme
      type: http
      scheme: bearer
      bearerFormat: JWT    # optional, arbitrary value for documentation purposes
security:
  - basicAuth: []  # <-- use the same name here
  - bearerAuth: []  # <-- use the same name here
