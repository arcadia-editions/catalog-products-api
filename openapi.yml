openapi: 3.0.1
info:
  title: "Arcadia Editions - Product Catalog"
  version: 0.0.1
  description: "Arcadia Editions - Product Catalog"
  contact:
    email: email@domain.com
servers:
  - description: localhost
    url: http://localhost:8080/api
  - description: custom
    url: "{protocol}://{server}/{path}"
    variables:
      protocol:
        enum: ['http', 'https']
        default: 'http'
      server:
        default: 'localhost:8080'
      path:
        default: 'api'
tags:
  - name: "Default"
  - name: "ProductCatalog"


paths:
  /products:
    post:
      operationId: createProduct
      description: "createProduct"
      tags: [ProductCatalog]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}:
    put:
      operationId: updateProduct
      description: "updateProduct"
      tags: [ProductCatalog]
      parameters:
        - name: "id"
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}/publish:
    post:
      operationId: publishProduct
      description: "publishProduct"
      tags: [ProductCatalog]
      parameters:
        - name: "id"
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "201":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}/retire:
    post:
      operationId: retireProduct
      description: "retireProduct"
      tags: [ProductCatalog]
      parameters:
        - name: "id"
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "201":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

components:
  schemas:
    CreateProductInput:
      type: "object"
      x-business-entity: "CreateProductInput"
      required:
      - "sku"
      - "name"
      - "price"
      - "currency"
      - "editionSize"
      - "trackingMode"
      properties:
        sku:
          type: "string"
        name:
          type: "string"
        description:
          type: "string"
        price:
          type: "number"
          format: "double"
        currency:
          type: "string"
        editionSize:
          type: "integer"
          format: "int32"
        trackingMode:
          $ref: "#/components/schemas/InventoryTrackingMode"
        launchAt:
          type: "string"
          format: "date-time"
    UpdateProductInput:
      type: "object"
      x-business-entity: "UpdateProductInput"
      properties:
        name:
          type: "string"
        description:
          type: "string"
        price:
          type: "number"
          format: "double"
        currency:
          type: "string"
        launchAt:
          type: "string"
          format: "date-time"
    Product:
      type: "object"
      x-business-entity: "Product"
      required:
      - "sku"
      - "name"
      - "price"
      - "currency"
      - "editionSize"
      - "trackingMode"
      - "status"
      properties:
        id:
          type: "integer"
          format: "int64"
          readOnly: true
        version:
          type: "integer"
          default: "null"
          description: "Version of the document (required in PUT for concurrency control,\
            \ should be null in POSTs)."
        sku:
          type: "string"
        name:
          type: "string"
        description:
          type: "string"
        price:
          type: "number"
          format: "double"
        currency:
          type: "string"
        editionSize:
          type: "integer"
          format: "int32"
        trackingMode:
          $ref: "#/components/schemas/InventoryTrackingMode"
        launchAt:
          type: "string"
          format: "date-time"
        status:
          $ref: "#/components/schemas/ProductStatus"
    ProductStatus:
      type: "string"
      x-business-entity: "ProductStatus"
      enum:
      - "DRAFT"
      - "PUBLISHED"
      - "RETIRED"
    InventoryTrackingMode:
      type: "string"
      x-business-entity: "InventoryTrackingMode"
      enum:
      - "QUANTITY"
      - "SERIALIZED"

    Page:
      type: object
      required:
        - "content"
        - "totalElements"
        - "totalPages"
        - "size"
        - "number"
      properties:
        number:
          type: integer
          minimum: 0
        numberOfElements:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 0
          maximum: 200
          multipleOf: 25
        totalElements:
          type: integer
        totalPages:
          type: integer

  parameters:
    page:
      name: page
      in: query
      description: The number of results page
      schema:
        type: integer
        format: int32
        default: 0
    limit:
      name: limit
      in: query
      description: The number of results in a single page
      schema:
        type: integer
        format: int32
        default: 20
    sort:
      name: sort
      in: query
      description: Sort results by field name and direction (asc or desc)
      schema:
        type: array
        items:
          type: string

  securitySchemes:
    basicAuth:     # <-- arbitrary name for the security scheme
      type: http
      scheme: basic
    bearerAuth:     # <-- arbitrary name for the security scheme
      type: http
      scheme: bearer
      bearerFormat: JWT    # optional, arbitrary value for documentation purposes
security:
  - basicAuth: []  # <-- use the same name here
  - bearerAuth: []  # <-- use the same name here
