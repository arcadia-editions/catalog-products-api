asyncapi: 3.0.0
id: urn:com.arcadiaeditions:catalog:products:asyncapi
info:
  title: "Arcadia Editions - Product Catalog"
  version: 0.0.1
  tags:
    - name: "Default"
    - name: "ProductCatalog"

defaultContentType: application/json

channels:
  ProductPublishedEventsChannel:
    address: "catalog-products.events.product-published"
    messages:
      ProductPublishedMessage:
        $ref: '#/components/messages/ProductPublishedMessage'
  ProductRetiredEventsChannel:
    address: "catalog-products.events.product-retired"
    messages:
      ProductRetiredMessage:
        $ref: '#/components/messages/ProductRetiredMessage'

operations:
  onProductPublished:
    action: send
    x-principal: sa_account
    tags:
      - name: ProductCatalog
    channel:
      $ref: '#/channels/ProductPublishedEventsChannel'
  onProductRetired:
    action: send
    x-principal: sa_account
    tags:
      - name: ProductCatalog
    channel:
      $ref: '#/channels/ProductRetiredEventsChannel'


components:
  messages:
    ProductPublishedMessage:
      name: ProductPublishedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/ProductPublished.avsc"
    ProductRetiredMessage:
      name: ProductRetiredMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/ProductRetired.avsc"

  messageTraits:
    CommonHeaders:
      headers:
        type: object
        properties:
          kafka_messageKey:
            type: "integer"
            format: "int64"
            description: This header value will be populated automatically at runtime
            x-runtime-expression: $message.payload#/id
          # CloudEvents Attributes
          ce-id:
            type: string
            description: Unique identifier for the event
            x-runtime-expression: $message.payload#{#this.id}
          ce-source:
            type: string
            description: URI identifying the context where event happened
            x-runtime-expression: $message.payload#{"ProductCatalog"}
          ce-specversion:
            type: string
            description: CloudEvents specification version
            x-runtime-expression: $message.payload#{"1.0"}
          ce-type:
            type: string
            description: Event type
            x-runtime-expression: $message.payload#{#this.getClass().getSimpleName()}
          ce-time:
            type: string
            description: Timestamp of when the event happened
            x-runtime-expression: $message.payload#{T(java.time.Instant).now().toString()}

