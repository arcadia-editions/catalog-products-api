asyncapi: 3.1.0
id: urn:com.arcadiaeditions:catalog:products:asyncapi

info:
  title: Arcadia Editions - Product Catalog
  version: 0.0.1
  tags:
  - name: Default
  - name: ProductCatalog

servers:
  develop:
    $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-master.yml#/servers/develop

x-application-bindings:
  x-principal: catalog_products
  x-clientId: catalog_products
  x-groupId: catalog_products

defaultContentType: application/json

channels:
  product-published-event-v1:
    address: catalog-products.product-published.event.avro.v1
    messages:
      ProductPublishedMessage:
        $ref: "#/components/messages/ProductPublishedMessage"
    x-traits:
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicS
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicRetained
  product-retired-event-v1:
    address: catalog-products.product-retired.event.avro.v1
    messages:
      ProductRetiredMessage:
        $ref: "#/components/messages/ProductRetiredMessage"
    x-traits:
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicS
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicRetained

operations:
  onProductPublished:
    action: send
    tags:
    - name: ProductCatalog
    channel:
      $ref: "#/channels/product-published-event-v1"
    traits:
    - $ref: "#/components/operationTraits/clientIdAndPrincipal"
  onProductRetired:
    action: send
    tags:
    - name: ProductCatalog
    channel:
      $ref: "#/channels/product-retired-event-v1"
    traits:
    - $ref: "#/components/operationTraits/clientIdAndPrincipal"

components:
  messages:
    ProductPublishedMessage:
      name: ProductPublishedMessage
      title: ""
      summary: ""
      traits:
      - $ref: "#/components/messageTraits/CommonHeaders"
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: avro/ProductPublished.avsc
    ProductRetiredMessage:
      name: ProductRetiredMessage
      title: ""
      summary: ""
      traits:
      - $ref: "#/components/messageTraits/CommonHeaders"
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: avro/ProductRetired.avsc
  messageTraits:
    CommonHeaders:
      $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-message-traits.yml#/components/messageTraits/CommonHeaders
  operationTraits:
    clientIdAndPrincipal:
      bindings:
        kafka:
          x-principal:
            $ref: "#/x-application-bindings/x-principal"
          x-groupId:
            $ref: "#/x-application-bindings/x-groupId"
